# stars_automator.cfg — default configuration (committed, placeholder paths)
#
# Copy this file to stars_automator.local.cfg and fill in the real paths
# for your machine.  stars_automator.local.cfg is gitignored.
#
# Priority (highest to lowest):
#   1. Environment variable  (STARS_EXE, STARS_PARSER_DIR, etc.)
#   2. stars_automator.local.cfg
#   3. This file

[paths]
# Path to stars.exe (Wine-compatible 32-bit binary)
stars_exe = /path/to/stars.exe

# Directory containing stars_file_parser binaries
# (json_to_r1, json_to_def, m1_to_json, …)
# Build with: cd stars_file_parser && cargo build
stars_parser_dir = /path/to/stars_file_parser/target/debug

# Root of the stars-reborn-research repository
# (used by experiment scripts to locate the game corpus)
stars_research_dir = /path/to/stars-reborn-research

[wine]
# Wine prefix directory — must be 32-bit (WINEARCH=win32)
wineprefix = ~/.wine32

# X display for Wine / Xvfb
display = :99
